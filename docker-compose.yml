# Standalone deploy: run from this directory on the server (after copying this folder).
# Put secrets in `.env` next to this file, then: docker compose up --build -d
# UI: http://<host>:9100

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    ports:
      - "9100:9100"
    env_file:
      - .env
    restart: unless-stopped
